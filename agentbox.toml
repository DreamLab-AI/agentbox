vector_db = "ruvector-embedded"

[sovereign_mesh]
enabled = true
solid_pod = true
nostr_bridge = true
https_bridge = false

[desktop]
enabled = false
resolution = "1920x1080"

[skills.browser]
agent_browser = true
playwright = true
qe_browser = false

[skills.media]
ffmpeg = true
imagemagick = true
comfyui_integration = false

[skills.spatial_and_3d]
qgis = false
blender = false

[skills.data_science]
pytorch = false
jupyter = false

[skills.docs]
latex = true
report_builder = true
mermaid = true

[skills.ontology]
enabled = false

[providers.anthropic]
enabled = false
env_var = "ANTHROPIC_API_KEY"
