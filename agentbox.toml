[security]
# ADR-007 W021: when one or more feature exceptions widen the attack surface
# beyond the hardened baseline (cap_add or security_opt_override), the
# operator must explicitly acknowledge the residual risk. The flake fails
# closed at compose-eval time when this is missing while exceptions are
# active. Currently SYS_ADMIN (chromium sandbox) and NET_ADMIN (tailscale
# userspace tun) are widening caps; review docs/user/configuration.md for
# the residual attack surface analysis before flipping this to true.
audit_acknowledged = true

# Feature-specific exceptions to the hardened baseline.
# Each key must match an enabled feature gate (validator rule E020).
# Add the exception block when you enable the corresponding feature.
# Reference table of all known exceptions is in docs/reference/adr/ADR-007-runtime-contract-and-container-hardening.md.
#
# Currently enabled feature exceptions (mirrors active feature gates above):

# Required because adapters.pods = "local-solid-rs" is the only supported
# implementation (ADR-010; the legacy local-jss Python stub was removed
# 2026-04-25). solid-pod-rs needs a writable path under read_only:true
# for its filesystem backend — .meta and .acl sidecars plus atomic-rename
# temp files.
[security.exceptions.solid-pod-rs]
writable_volumes = ["solid-data:/var/lib/solid"]
reason = "solid-pod-rs fs-backend requires atomic-rename writable storage under /var/lib/solid"

# [security.exceptions.playwright] removed — no local chromium in image.
# The NNP exception is no longer needed; browser sandbox runs in the
# external browsercontainer sidecar.

[security.exceptions.desktop]
# X11 abstract socket dir (mode 1777 sticky — the canonical X11 perm) and
# devuser's runtime dir (XDG_RUNTIME_DIR convention: 0700, owned by uid).
# Without explicit mode/uid, Docker creates these root-owned at default
# tmpfs perms, so devuser-side X clients fail to bind/connect.
tmpfs = ["/tmp/.X11-unix:mode=1777", "/run/user/1000:mode=700,uid=1000,gid=1000"]

[security.exceptions.code-server]
writable_volumes = ["codeserver-config:/home/devuser/.local/share/code-server"]

[security.exceptions.telegram-mirror]
writable_volumes = ["ctm-config:/home/devuser/.config/claude-telegram-mirror"]

[security.exceptions.gpu-cuda]
writable_volumes = []
reason = "CUDA runtime requires device access; no additional writable volumes needed"

[security.exceptions.tailscale]
writable_volumes = ["tailscale-state:/var/lib/tailscale"]
cap_add = ["NET_ADMIN"]
reason = "tailscaled needs persistent state dir and NET_ADMIN for userspace networking socket"

[security.exceptions.nostr-relay]
writable_volumes = ["nostr-relay-data:/var/lib/nostr-relay"]
reason = "nostr-rs-relay SQLite journal and WAL require a writable durable path"

[security.exceptions.consultants]
writable_volumes = ["consultations-data:/var/lib/agentbox/consultations"]
reason = "consultant tier writes JSONL audit log per call"
