[core]
orchestration = "ruflo-v3"
vector_db = "ruvector-embedded"

# ── Five-slot adapter architecture (ADR-005) ───────────────────────────────────
# local-solid-rs is the first-class pod implementation (ADR-010); the legacy
# local-jss Python stub was retired 2026-04-25 and is no longer accepted by
# the schema. Each adapter slot resolves to one of three implementation
# classes — `local-*`, `external`, or `off` — see docs/user/configuration.md
# for the full matrix and trade-offs.
[adapters]
beads        = "local-sqlite"
pods         = "local-solid-rs"
memory       = "embedded-ruvector"
events       = "local-jsonl"
orchestrator = "local-process-manager"

[sovereign_mesh]
enabled = true
solid_pod = true
nostr_bridge = true
https_bridge = false

# ── Embedded Nostr relay (PRD-004 / ADR-009 / DDD-003) ──────────────────────────
# Gives external agents and humans a durable path to talk to internal agents.
# Every signature-verified event targeting a local npub is persisted to the
# pod mailbox at pods/<npub>/events/inbox/<id>.json. Outbound messages written
# to events/outbox/ are signed by the sovereign identity and published to
# the embedded relay plus (optionally) the NOSTR_RELAYS fan-out list.
#
# Default shape: nostr-rs-relay on loopback :7777, allowlist ingress, pod-bridge
# on, no external fan-out (matches [federation].mode = "standalone").
[sovereign_mesh.relay]
enabled          = false
implementation   = "nostr-rs-relay"   # nostr-rs-relay | rnostr | external | off
port             = 7777
bind             = "127.0.0.1"
expose           = false
data_dir         = "/var/lib/nostr-relay"
ingress_policy   = "allowlist"        # allowlist | signed-only | open
allowed_pubkeys  = []                  # empty = self only (own npub)
allowed_kinds    = [1, 1059, 30078, 27235, 38000, 38100]
pod_bridge       = true
external_fanout  = "off"               # bidirectional | publish-only | subscribe-only | off
max_event_bytes  = 131072
messages_per_sec = 5
retention_days   = 30
allow_nip04      = false
info_description = "Agentbox sovereign relay"
info_contact     = ""

[desktop]
enabled = false
resolution = "1920x1080"

[skills.browser]
agent_browser = true
playwright = true
qe_browser = false

[skills.media]
ffmpeg = true
imagemagick = true
comfyui_builtin = false

[integrations.comfyui_external]
enabled = false
url = "http://comfyui:8188"
ws_url = "ws://comfyui:8188/ws"

# ── solid-pod-rs (first-class; ADR-010) ─────────────────────────────────────────
# First-party Rust Solid Protocol 0.11 server from github.com/DreamLab-AI.
# Used by the pods adapter when adapters.pods = "local-solid-rs" (the default).
# See docs/developer/licensing.md for the AGPL-3.0-only aggregation analysis.
[integrations.solid_pod_rs]
port                   = 8484
bind                   = "127.0.0.1"
storage                = "fs"                    # fs | memory | s3
storage_root           = "/var/lib/solid"
base_url               = "http://127.0.0.1:8484"
enable_oidc            = false
enable_schnorr_verify  = true
enable_dpop_cache      = false
notifications          = "websocket"             # websocket | webhook | off
log_level              = "info"

# Sprint 5-9 features absorbed from upstream main — all on by default because
# they either sharpen sovereign-stack invariants (did_nostr) or close P0
# hardening gaps (rate_limit, quota, webhook_signing).
enable_did_nostr       = true     # did:nostr:<npub> → Solid WebID resolver
enable_webhook_signing = true     # RFC 9421 Ed25519 outbound notification signing
enable_rate_limit      = true     # sliding-window LRU per-connection guard
enable_quota           = true     # per-pod storage quota via .quota.json sidecar
jss_v04_compat         = true     # preserve JavaScriptSolidServer v0.4 semantics
rate_limit_per_sec     = 20       # per-connection ceiling when enable_rate_limit
quota_default_bytes    = 10737418240  # 10 GiB per pod when enable_quota

[skills.spatial_and_3d]
qgis = false
blender = false

[skills.data_science]
pytorch = false
jupyter = false

[skills.docs]
latex = true
report_builder = true
mermaid = true

[skills.ontology]
enabled = false

[providers.anthropic]
enabled = false
env_var = "ANTHROPIC_API_KEY"
optional_env_vars = []

[providers.openai]
enabled = false
env_var = "OPENAI_API_KEY"
optional_env_vars = ["OPENAI_BASE_URL"]

[providers.gemini]
enabled = false
env_var = "GOOGLE_GEMINI_API_KEY"
optional_env_vars = []

[providers.deepseek]
enabled = false
env_var = "DEEPSEEK_API_KEY"
optional_env_vars = ["DEEPSEEK_BASE_URL"]

[providers.perplexity]
enabled = false
env_var = "PERPLEXITY_API_KEY"
optional_env_vars = []

[providers.openrouter]
enabled = false
env_var = "OPENROUTER_API_KEY"
optional_env_vars = []

[providers.context7]
enabled = false
env_var = "CONTEXT7_API_KEY"
optional_env_vars = []

[providers.brave]
enabled = false
env_var = "BRAVE_API_KEY"
optional_env_vars = []

[providers.github]
enabled = false
env_var = "GITHUB_TOKEN"
optional_env_vars = []

[providers.zai]
enabled = false
env_var = "ZAI_API_KEY"
optional_env_vars = ["ZAI_ANTHROPIC_API_KEY", "ZAI_URL"]

[gpu]
backend = "none"

# ── Consultant tier (PRD-005 / ADR-011) ────────────────────────────────────────
# Five MCP servers that expose external LLM providers as named consultants
# the Claude / ruflo coordinator can invoke explicitly. Each maps to its
# matching [providers.*] auth block; enabling a consultant requires the
# matching provider be enabled and its env_var set (validator E035).
#
# Manual call from chat: /consult <name> "<question>" (skill-router skill).
# Automatic dispatch: subagent_type="auto-consultant" (agent template).
#
# Logs: /var/lib/agentbox/consultations/<name>-YYYY-MM-DD.jsonl
# Optional ADR-043 quality signals: /workspace/profiles/<stack>/intelligence/data/
[consultants]
enabled = false                                 # master gate (E036)
log_dir = "/var/lib/agentbox/consultations"
intelligence_signal = false                     # write ADR-043 QualitySignal files

[consultants.codex]
enabled = false
model   = "gpt-5.4"
home    = "/home/openai-user/.codex"
timeout_ms = 180000

[consultants.gemini]
enabled = false
model   = "gemini-2.5-pro"
home    = "/home/gemini-user"
timeout_ms = 180000

[consultants.zai]
enabled = false
model   = "glm-5"
home    = "/home/zai-user"
timeout_ms = 180000

[consultants.perplexity]
enabled = false
model   = "sonar-pro"
timeout_ms = 60000

[consultants.deepseek]
enabled = false
model   = "deepseek-reasoner"
timeout_ms = 120000

# ── Privacy filter ──────────────────────────────────────────────────────────────
# Local PII redaction sidecar using openai/privacy-filter (1.5B MoE, Apache-2.0).
# See docs/reference/adr/ADR-008-privacy-filter-routing.md for the routing layer
# contract. Gated: the wizard only offers this when a GPU is detected or the
# host has ≥4 cores and ≥6 GB free RAM (CPU path needs all experts resident).
#
# mode: off       → sidecar disabled; adapter dispatch is a pass-through.
#       local-gpu → HF transformers pipeline, BF16 on CUDA/ROCm.
#       local-cpu → HF transformers pipeline on CPU (~3 GB BF16 weights).
#
# Per-slot policy values:
#   "strict" → redact-before-persist; fail-closed if router unreachable.
#   "soft"   → redact best-effort; fail-open with counter.
#   "off"    → pass-through.
[privacy_filter]
enabled = false
mode = "off"
port = 9092
dtype = "bf16"
model = "openai/privacy-filter"

[privacy_filter.policy]
pods         = "strict"
memory       = "strict"
events       = "soft"
beads        = "soft"
orchestrator = "off"
inbound      = "soft"
outbound     = "soft"

[privacy_filter.entities]
# Empty list = redact all eight classes. Populate to restrict the set.
# Allowed: account_number, private_address, private_email, private_person,
#          private_phone, private_url, private_date, secret.
enabled = []

# ── Linked-Data interchange (PRD-006 / ADR-012 / DDD-004) ──────────────────────
# Master gate for the eleven JSON-LD federation surfaces. Default off — a
# clone+up build sees zero behavioural change. Each per-surface gate accepts
# on | emit | off; rules E040–E049 enforce coherence.
#
# Phase 1 (mechanism only): architecture_docs, skill_metadata.
# Phase 2 (sovereign-stack): pods, events, did_documents, provenance.
# Phase 3 (credentials):     credentials, payments, capability_descriptors,
#                            memory_catalogue, http_meta.
[linked_data]
enabled                = false
pods                   = "off"   # S1  Solid pod resource representations
events                 = "off"   # S2  Nostr envelope payloads
credentials            = "off"   # S3  W3C Verifiable Credentials
did_documents          = "off"   # S4  DID Documents at /.well-known/did.json
provenance             = "off"   # S5  PROV-O receipts (parallel to events)
capability_descriptors = "off"   # S6  W3C WoT Thing Descriptions for MCP
skill_metadata         = "off"   # S7  Schema.org HowTo (build-time)
payments               = "off"   # S8  Mandates + receipts (VC + ODRL)
memory_catalogue       = "off"   # S9  DCAT-3 namespace catalogue
architecture_docs      = "off"   # S10 ADR/PRD/DDD frame frontmatter (build-time)
http_meta              = "off"   # S11 Content-negotiated /v1/meta + /v1/agent-events
default_form           = "compacted"
context_catalogue      = "/opt/agentbox/contexts"
context_cache_mode     = "image"        # image | bind | off (E046)
unknown_context_policy = "fail-closed"  # fail-closed | fail-open (W047)
canonicalisation       = "jcs"          # jcs required for credentials/payments (E043)
round_trip_in_dispatch = true           # CI canary; turn off for hot paths

[linked_data.contexts]
# Operator overrides for context IRIs. Each value MUST resolve to a pinned
# ContextDocument in lib/linked-data-contexts.nix (E045). Leave empty for
# the catalogue defaults.

[linked_data.did]
method                = "nostr"
service_endpoints     = ["pod", "relay"]
publish_to_well_known = true

[linked_data.privacy_handoff]
order = "after"   # documentation only — the order is fixed in code (E048)

# Linked-Object Viewer slot (S12 — PRD-006 §15 / ADR-013).
# A JSON-LD-aware browser at /lo/* that renders every PRD-006 surface.
# Default off — turning it on materialises linkedobjects/browser into
# the image at /opt/agentbox/browser/. Pane manifest at /lo/manifest.json.
# Validation rules: E050-E054, W053.
[linked_data.viewer]
mode                 = "off"     # off | local-linkedobjects | external
mount_path           = "/lo"
bundle_path          = "/opt/agentbox/browser"
external_url         = ""
sri_hash             = ""
expose_port          = false
extra_panes          = []
upstream_panes_visible = true
source_code_header   = ""        # default = upstream repo URL (AGPL §13)

[toolchains]
claude = true
ruflo = true
claude_flow = true
agentic_qe = true
nagual_qe = false   # upstream not on public npm — flake.nix guards with fakeHash
codebase_memory = true
rust = true
gemini_cli = false
codex = false      # OpenAI Codex Rust-native CLI (github.com/openai/codex)

[observability]
metrics_port = 9091
otlp_endpoint = ""
log_level = "info"

[security]
# Feature-specific exceptions to the hardened baseline.
# Each key must match an enabled feature gate (validator rule E020).
# Add the exception block when you enable the corresponding feature.
# Reference table of all known exceptions is in docs/reference/adr/ADR-007-runtime-contract-and-container-hardening.md.
#
# Currently enabled feature exceptions (mirrors active feature gates above):

# Required because adapters.pods = "local-solid-rs" is the only supported
# implementation (ADR-010; the legacy local-jss Python stub was removed
# 2026-04-25). solid-pod-rs needs a writable path under read_only:true
# for its filesystem backend — .meta and .acl sidecars plus atomic-rename
# temp files.
[security.exceptions.solid-pod-rs]
writable_volumes = ["solid-data:/var/lib/solid"]
reason = "solid-pod-rs fs-backend requires atomic-rename writable storage under /var/lib/solid"

[security.exceptions.playwright]
# Required because skills.browser.playwright = true
# Chromium needs user namespace sandbox or SYS_ADMIN cap.
# Alternative: pass --no-sandbox to Chromium at the cost of defense-in-depth.
cap_add = ["SYS_ADMIN"]
reason = "chromium sandbox; SYS_ADMIN is the minimum privilege for Chromium user-ns sandbox inside a container"

# Add when enabling [sovereign_mesh.relay]. The relay needs a writable path
# under read_only:true to hold its SQLite database and WAL files.
# [security.exceptions.nostr-relay]
# writable_volumes = ["nostr-relay-data:/var/lib/nostr-relay"]
# reason = "nostr-rs-relay SQLite journal and WAL require a writable durable path"
