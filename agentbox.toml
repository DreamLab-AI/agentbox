[core]
orchestration = "ruflo-v3"
vector_db = "ruvector-embedded"

# ── Five-slot adapter architecture (ADR-005) ───────────────────────────────────
# local-solid-rs is the first-class pod implementation (ADR-010); the legacy
# local-jss Python stub was retired 2026-04-25 and is no longer accepted by
# the schema. Each adapter slot resolves to one of three implementation
# classes — `local-*`, `external`, or `off` — see docs/user/configuration.md
# for the full matrix and trade-offs.
[adapters]
beads        = "off"
pods         = "local-solid-rs"
memory       = "external-pg"
events       = "local-jsonl"
orchestrator = "local-process-manager"

# ── Sovereign-mesh subsystem (boundary: ADR-030) ──────────────────────────────
# One manifest-gated subsystem umbrellaing every Nostr-identity-and-relay feature
# (relay, operator identity, per_user_agents, junkiejarvis, mobile_bridge, git,
# multi_user). Gate semantics: default off; the env var remains the runtime
# override (R7 fix) so manifest-absent deployments keep working. The whole mesh
# makes exactly ONE external data hop — the [sovereign_mesh.mobile_bridge] Z.AI
# summarisation (ADR-030 D3). The per-turn live mirror (ADR-029) belongs to this
# subsystem too but is gated by recipient-pubkey env presence, not a manifest key.
[sovereign_mesh]
enabled = true
solid_pod = true
nostr_bridge = true
https_bridge = true
publish_agent_events = true
# WS7 (PRD-014 Seam B): bind a voice transcript to an agent intent and emit the
# canonical agent_action notification at POST /v1/voice-intent. Off → 503.
voice_intent = false
# WS6 (PRD-014 Seam D): scan the personal KG (via the memory adapter slot) for
# elevation candidates, emit agent_action LINK beams, and return the GOVERNED
# ontology-propose descriptors at POST /v1/kg-elevation/scan. Off → 503.
kg_elevation = false
# JunkieJarvis forum agent (management-api/lib/junkiejarvis-agent.js): rides the
# management-api process and answers forum mentions over Nostr. Requires BOTH
# this manifest gate AND the JUNKIEJARVIS_ENABLED=true env var — the env var
# remains the runtime override, so existing deployments keep working when the
# manifest is absent.
# Gate semantics + subsystem boundary: ADR-030.
junkiejarvis = false
# Per-user agent sessions (management-api/lib/per-user-agent.js +
# scripts/run-per-user-agent.cjs): one Claude session per pod user, spawned on
# inbound relay messages. Manifest declaration of the live feature gate.
# Canonical gate for ADR-028 (Per-User Agent Fabric, Accepted): this key —
# [sovereign_mesh].per_user_agents — is the gate, NOT a top-level [per_user_agents]
# table. See ADR-028 "Gate-key alignment" + ADR-030.
per_user_agents = false

# ── Mobile agent bridge (replaces the retired Telegram/CTM mirror) ────────────
# The phone↔agent path is now pure Nostr, not Telegram. An Android Nostr client
# (Amethyst + Amber signer) talks to the embedded relay below; the phone holds
# its OWN key plus a NIP-26 delegation signed by [sovereign_mesh.operator], so
# the operator never ships a private key to the device. Inbound NIP-59 gift wraps
# (kind 1059) are unwrapped by the Rust bridge (services/nostr-pod-bridge, which
# consumes nostr-bbs-core + solid-pod-rs-nostr) and persisted to the pod inbox.
# The durable record of a conversation is a kind-30840 session-summary event
# dual-written to the relay and the pod, NOT a chat transcript held in agentbox.
# Ingress knobs live under [sovereign_mesh.relay] and identity under
# [sovereign_mesh.operator]; the egress phone-mirror toggle lives under
# [sovereign_mesh.mobile_bridge] below.

# ── Mobile bridge egress (session-summary phone mirror) ───────────────────────
# Egress half of the bridge: on SessionEnd a hook distils the transcript into a
# curated digest (summary + actions + actionable questions, NOT the full
# transcript) via the paid Z.AI/GLM consultant (ADR-011), then pipes it into
# `nostr-pod-bridge summarise`, which signs a kind-30840 and dual-writes it to
# the relay + pod. Disabled by default: when enabled=false the SessionEnd hook
# is not registered and no transcript ever leaves the box. Even when enabled it
# stays a silent no-op at runtime unless the bridge secrets (AGENTBOX_BRIDGE_SK /
# AGENTBOX_BRIDGE_RECIPIENT_PUBKEY / AGENTBOX_POD_ROOT / AGENTBOX_ADMIN_PUBKEY)
# and a Z.AI key are present. Privacy note: when enabled, the transcript is sent
# to ZAI_URL for summarisation — the one external hop on this path. Point ZAI_URL
# at a local GLM endpoint to keep summarisation on-box.
[sovereign_mesh.mobile_bridge]
enabled       = false      # register the SessionEnd phone-mirror hook
summary_model = "glm-5.2"  # Z.AI/GLM model for the digest (→ AGENTBOX_ZAI_MODEL)

# ── Operator identity (optional) ────────────────────────────────────────────────
# The human operator's Nostr identity. When set, this pubkey is:
#   - Added to the relay allowlist (can publish events to the embedded relay)
#   - Granted operator-level access to management API via NIP-98
#   - Tagged as the delegator on NIP-26 agent delegations
#   - Used as the WebID owner in Solid pod ACLs
# If omitted, the agentbox runs in autonomous mode (self-signed identity only).
# The private key is NEVER stored in agentbox.toml — pass it via env var
# OPERATOR_NOSTR_PRIVKEY or use NIP-07/NIP-46 remote signing.
[sovereign_mesh.operator]
pubkey_hex = "11ed64225dd5e2c5e18f61ad43d5ad9272d08739d3a20dd25886197b0738663c"                        # 64-char hex secp256k1 pubkey
npub       = ""                        # bech32 npub (alternative to hex; one is sufficient)
display_name = ""                      # human-readable name for event tags
relay_urls = []                        # operator's preferred relays for fan-out

# ── Embedded Nostr relay (PRD-004 / ADR-009 / DDD-003) ──────────────────────────
# Gives external agents and humans a durable path to talk to internal agents.
# Every signature-verified event targeting a local npub is persisted to the
# pod mailbox at pods/<npub>/events/inbox/<id>.json. Outbound messages written
# to events/outbox/ are signed by the sovereign identity and published to
# the embedded relay plus (optionally) the NOSTR_RELAYS fan-out list.
#
# Default shape: nostr-rs-relay on loopback :7777, allowlist ingress, pod-bridge
# on, no external fan-out (matches [federation].mode = "standalone").
[sovereign_mesh.relay]
enabled          = true
implementation   = "nostr-rs-relay"   # nostr-rs-relay | rnostr | external | off
port             = 7777
bind             = "127.0.0.1"
expose           = false
data_dir         = "/var/lib/nostr-relay"
ingress_policy   = "allowlist"        # allowlist | signed-only | open
allowed_pubkeys  = []                  # empty = self only (own npub); operator pubkey auto-added at boot
# Mobile bridge kinds: 1059 = NIP-59 gift wrap (phone→agent encrypted envelope),
# 30840 = addressable session-summary (the durable conversation record, dual-written
# to relay + pod). 27235 = NIP-98 HTTP auth. 38xxx = agent-intent/event surfaces.
allowed_kinds    = [1, 1059, 30078, 30840, 27235, 31400, 31401, 31402, 31403, 31404, 31405, 38000, 38100, 38200, 38201, 38300, 38301, 38302, 38303, 38304, 38305]
pod_bridge       = true
external_fanout  = "bidirectional"     # bidirectional | publish-only | subscribe-only | off
# PRD-014 Seam B / B3 — deterministic responder dispatch for voice-origin
# agent-intent events (kinds 38000-38099). Empty (default) → marker-only path,
# byte-identical to prior behaviour. Set to a command and the relay consumer
# spawns it per intent, passing the addressed actor + the Schnorr-verified
# did:nostr:<signer> as AGENTBOX_INTENT_SOURCE_URN (unforgeable attribution).
intent_command   = ""                  # e.g. "claude-flow"; "" = disabled
intent_args      = ""                  # extra leading args, space-separated
# PRD-014 Seam B / B4 — per-agent did:nostr auth on POST /v1/agent-events/emit.
# "off" (default) keeps caller-asserted/env-defaulted attribution. "nip98"
# requires a kind-27235 header and stamps source_urn from the verified pubkey.
agent_event_auth = "off"               # off | nip98
# Private point-to-point relay for governance event exchange with the forum.
# Set via NOSTR_RELAYS env var at runtime; this field documents the target.
forum_relay_url  = "wss://dreamlab-nostr-relay.solitary-paper-764d.workers.dev"
max_event_bytes  = 131072
messages_per_sec = 5
retention_days   = 30
allow_nip04      = false
info_description = "Agentbox sovereign relay"
info_contact     = ""

# ── Multi-tenant did:nostr user pods (PRD-007, ADR-017) ─────────────────────
# When enabled, agentbox hosts per-user pods at pods/<pubkey-hex>/ for each
# successfully AUTH'd did:nostr identity. When disabled (default), only the
# operator pubkey gets a pod (legacy single-tenant). Provisioning policy
# selects the trust model for accepting new users.
# ─── Git-versioned pods (JSS #466/#469/#471, solid-pod-rs alpha.12) ────────
# When enabled, each pod directory is `git init -b main`'d at provisioning
# time via solid_pod_rs_git::init::GitAutoInit. The management-api exposes
# a `GET|POST /pods/:npub/.git/*` HTTP smart-protocol endpoint backed by
# git-http-backend CGI, authenticated via NIP-98 bearer.
#
# enabled = true  : auto-init runs at POST /pods (ADR-017 provisioning path)
# enabled = false : pods are plain directories — no git history
#
# See docs/user/git-pods.md for clone instructions.
[sovereign_mesh.git]
enabled        = true           # safe to enable; git binary is present in agentbox
auto_init      = true           # git init -b main at provisioning (solid-pod-rs alpha.12)
default_branch = "main"         # pinned per JSS #471 contract
http_backend   = "git-http-backend"   # CGI path (default on Debian/Ubuntu/CachyOS)
http_route_prefix = "/pods"     # management-api mounts at /pods/:npub/.git/*
max_push_mb    = 100            # per-push body limit; git itself also has pack limits
auth_mode      = "nip98"        # bearer NIP-98 token required for write operations
read_public    = false          # set true to allow unauthenticated clone of public pods

[sovereign_mesh.multi_user]
enabled                     = false                  # opt-in (ADR-017 / PRD-007)
provisioning_policy         = "closed"               # closed | invite-only | open
invite_kind                 = 30910                  # NIP-58 invite event kind
invite_validity_seconds     = 86400                  # 24 hours
max_users                   = 100                    # safety cap; per-container scale target
suspend_inactive_after_days = 90                     # admin policy
admin_pubkeys               = []                     # operator pubkey auto-added at boot

# ── Mesh federation (PRD-010 Phase 3 / ADR-073) ─────────────────────────────
# Controls cross-substrate federation behaviour. Requires
# [sovereign_mesh.relay].enabled = true and [sovereign_mesh.nostr_bridge] = true.
#
# mode values:
#   "standalone"  — no federation; relay is loopback-only (default)
#   "federated"   — relay exposed externally; accepts peer connections
#   "client"      — subscribes to peers but does not accept inbound
[mesh]
mode = "standalone"
# Peer relay URLs. For tailnet federation, use MagicDNS hostnames:
#   peer_relays = ["ws://agentbox-02.tailnet-name.ts.net:7777"]
# For Cloudflare tunnel federation, use the public wss:// URL.
peer_relays = []
federated_kinds = [1, 1059, 30001, 30050, 30078, 30910, 31400, 31401, 31402, 31403, 31404, 31405, 38000, 38100, 38300, 38301, 38302, 38304]
allowed_remote_dids = []                 # did:nostr:<hex> of trusted peers
subscribed_kinds = []                    # subset of federated_kinds to pull; empty = all
honor_remote_moderation = false          # accept kind-30910 bans from peers

# ── Networking ─────────────────────────────────────────────────────────────────
# Tailscale provides direct encrypted access to the agentbox from any device
# on your tailnet — no port-forwarding, no SSH tunnels, no firewall rules.
# Uses userspace networking by default (no /dev/net/tun needed).
#
# SECURITY WARNING: Tailscale bypasses the did:nostr identity boundary.
# Traffic arriving over the tailnet is authenticated by Tailscale ACLs, not
# by Nostr keypair signatures. This is convenient for dev but weakens the
# sovereign-mesh trust model. For production deployments, prefer the
# did:nostr + NIP-98 auth path and leave tailscale = false.
#
# Auth: set TAILSCALE_AUTHKEY in .env (create at https://login.tailscale.com/admin/settings/keys)
# or omit to use interactive login via `docker exec agentbox tailscale up`.
[networking]
# Default off — see SECURITY WARNING above. Operators who need Tailscale on
# their own deployment should override in agentbox.local.toml or set
# TAILSCALE_AUTHKEY in .env and flip this to true. Leaving it false also
# removes the NET_ADMIN cap_add and the [security.exceptions.tailscale]
# block from the active set, tightening the default attack surface.
tailscale = true
# MagicDNS hostname on the tailnet. Must be unique per instance.
# This becomes the service discovery name for federation:
#   solid-pod-rs at http://agentbox.tailnet-name.ts.net:8484
#   nostr relay at ws://agentbox.tailnet-name.ts.net:7777
#   management API at http://agentbox.tailnet-name.ts.net:9090
# When tailscale = true, the entrypoint runs `tailscale up --hostname <this>`.
hostname = "agentbox"
# Gate /etc/hosts host-gateway alias (host.docker.internal:host-gateway).
# Default false — air-gapped and hardened deployments must opt in. When
# false, OPENAI_BASE_URL must point at a Docker-DNS-resolvable name
# (e.g. ollama:11434 if [providers.ollama].sidecar = true) or the agent
# fails closed at the LLM call site.
host_gateway = false

# ── LLM Resource Marketplace (kinds 38300-38305) ──────────────────────────────
# Mesh-wide negotiation of LLM compute resources between did:nostr identities.
# Providers advertise available models; consumers discover and request access;
# grants are tracked with token budgets and usage receipts that integrate with
# the Web Ledger payment rails in solid-pod-rs.
#
# Kind allocation (NIP-01 parameterised replaceable range 30000-39999):
#   38300  LLM Capability Advertisement  (replaceable, d-tag = model)
#   38301  LLM Capability Request
#   38302  LLM Grant
#   38303  LLM Deny
#   38304  LLM Usage Receipt
#   38305  LLM Grant Revocation
#
# Federated kinds: 38300 (ads), 38301 (requests), 38302 (grants), 38304 (receipts)
# Non-federated:   38303 (deny) and 38305 (revoke) are point-to-point only
[llm_marketplace]
enabled = true
# Auto-advertise this node's available models on relay startup.
# When true, the management-api publishes kind-38300 events for each
# model listed in [providers.*] that has a valid API key.
auto_advertise = true
# Maximum grant TTL in seconds. Grants exceeding this are clamped.
max_grant_ttl = 86400
# Maximum token allocation per grant. Zero = unlimited.
max_tokens_per_grant = 0
# Cost tier — maps to Web Ledger DREAM token pricing.
# "operator" = operator-set pricing; "market" = accept mesh best-offer.
pricing_mode = "operator"

[desktop]
enabled = true
stack = "x11-openbox"
resolution = "1920x1080"
# WebGPU flag retained for desktop apps (QGIS, Blender) that use GPU.
# Browser automation is handled exclusively by the external browsercontainer
# sidecar — no local chromium/playwright/agent-browser in the image.
webgpu = true

[skills.browser]
agent_browser = false
playwright = false
qe_browser = false
# All browser automation routes through the external browsercontainer sidecar.
# MCP SSE: http://browsercontainer:8931/sse (chrome-devtools-mcp 40+ tools)
# CDP: browsercontainer:9222 | VNC: :5903
# Start: agentbox.sh browsercontainer up
sidecar_mcp_url = "http://browsercontainer:8931/sse"
sidecar_cdp_host = "browsercontainer"
sidecar_cdp_port = 9222

[skills.media]
ffmpeg = true
imagemagick = true
comfyui_builtin = false

# ── Memory access control ──────────────────────────────────────────────────────
# Controls whether RuVector memory entries are scoped per authenticated caller.
#
# admin_access_mode values:
#   "permissive" — the admin/devuser (Bearer token) sees and writes all
#                  namespaces without any pubkey prefix. NIP-98 callers are
#                  still scoped to their own pubkey namespace.
#   "scoped"     — ALL callers (including admin) are restricted to their own
#                  pubkey-prefixed namespace. Stronger isolation, breaks
#                  cross-agent admin inspection.
#
# This flag is baked at Nix build time into MEMORY_ADMIN_ACCESS_MODE.
# Changing it requires a `nix build` + container recreate.
[memory]
admin_access_mode = "permissive"

# ── RuVector PostgreSQL (external memory backend) ──────────────────────────────
# Used when adapters.memory = "external-pg". Shared with the host container mesh
# via visionclaw_network network. The ruvector-postgres container runs pgvector.
#
# The password is sourced from the RUVECTOR_PG_PASSWORD env var at runtime
# (Q6: single source of truth). The conninfo template here uses the
# manifest-time placeholder so static analysis can read the connection
# string structure; the entrypoint substitutes the live password before
# the management-api consumes it.
[integrations.ruvector_external]
enabled  = true
conninfo = "postgresql://ruvector:@@RUVECTOR_PG_PASSWORD@@@ruvector-postgres:5432/ruvector"
# When true, the generated compose owns the ruvector-postgres sidecar:
# service block + healthcheck + depends_on, so `agentbox.sh up`/`rebuild`
# always brings the memory backend up with the stack. When false, an
# external deployment (host mesh) must provide ruvector-postgres on
# visionclaw_network. Incident 2026-06-09: the sidecar container was
# deleted and nothing recreated it — 2M+ memory entries unreachable
# until a manual `docker run`. This flag closes that gap.
manage_sidecar = true
image          = "ruvnet/ruvector-postgres:latest"
# Pre-existing volume holding the production dataset (PG17, 2M+ rows).
# The compose volume declaration reuses it by name; do NOT rename
# without a migration.
data_volume    = "ruvector_postgres_data_v2"

[integrations.comfyui_external]
enabled = false
url = "http://comfyui:8188"
ws_url = "ws://comfyui:8188/ws"

# ── solid-pod-rs (first-class; ADR-010) ─────────────────────────────────────────
# First-party Rust Solid Protocol 0.11 server from github.com/DreamLab-AI.
# Used by the pods adapter when adapters.pods = "local-solid-rs" (the default).
# See docs/developer/licensing.md for the AGPL-3.0-only aggregation analysis.
[integrations.solid_pod_rs]
port                   = 8484
bind                   = "0.0.0.0"
storage                = "fs"                    # fs | memory | s3
storage_root           = "/var/lib/solid"
# Public base URL — set to the Cloudflare Tunnel hostname when the native pod
# mesh is active (SOLID_POD_PUBLIC_URL env overrides at runtime).
base_url               = "https://pods-native.dreamlab-ai.com"
enable_oidc            = false
enable_schnorr_verify  = true
enable_dpop_cache      = false
notifications          = "websocket"             # websocket | webhook | off
log_level              = "info"

# Sprint 5-9 features absorbed from upstream main — all on by default because
# they either sharpen sovereign-stack invariants (did_nostr) or close P0
# hardening gaps (rate_limit, quota, webhook_signing).
# Pod adapter originates a signed NIP-98 Authorization header per request so an
# autonomous agent authenticates to a default-deny pod under its OWN did:nostr
# (PRD-014 Seam C / C2). Default OFF: unsigned requests are byte-identical to
# prior behaviour. When on, the signing key is the active stack's nostr.key.enc
# (resolved from AGENTBOX_STACK / integrations.solid_pod_rs.sign_stack); load
# failures fail open (adapter goes out unsigned, pod still fails closed).
sign_requests          = false    # originate signed NIP-98 from the pods adapter
enable_did_nostr       = true     # did:nostr:<pubkey> → Solid WebID resolver (ADR-013)
enable_webhook_signing = true     # RFC 9421 Ed25519 outbound notification signing
enable_rate_limit      = true     # sliding-window LRU per-connection guard
enable_quota           = true     # per-pod storage quota via .quota.json sidecar
jss_v04_compat         = true     # preserve JavaScriptSolidServer v0.4 semantics
rate_limit_per_sec     = 20       # per-connection ceiling when enable_rate_limit
quota_default_bytes    = 10737418240  # 10 GiB per pod when enable_quota

# Native pod mesh (alpha.15) — CORS allowlist + PSK admin provisioning.
# allowed_origins: comma-separated list; empty = wildcard (dev only).
# admin_key: must match NATIVE_POD_ADMIN_KEY CF Worker secret. Set via
#            SOLID_ADMIN_KEY env var — never hardcode here.
allowed_origins        = "https://dreamlab-ai.com"
admin_key_env          = "SOLID_ADMIN_KEY"       # env var name; value from .env.solid-pods

[skills.spatial_and_3d]
qgis = true
blender = true
gaussian_splatting = false

[skills.data_science]
pytorch = true
jupyter = true

[skills.docs]
latex = true
report_builder = true
mermaid = true

[skills.design]
# open-design: structured intake pipeline, 129 brand specs, 5-dimensional critique gate,
# P0/P1/P2 checklists, layout libraries (web/mobile/dashboard/deck). Default off.
# NOT a replacement for the setup wizard SPA (PRD-012 / ADR-024).
open_design = false

[skills.research]
# web-researcher-mcp (Go binary). Provides 8 MCP research tools.
# Headless-browser scrape tier is force-disabled at runtime; JS-rendered
# pages route to the external browsercontainer sidecar (`browser` skill).
web_researcher = true

# ── Code-as-Harness integration (PRD-008) ────────────────────────────────────
# Phase 1 (build-now): code-interpreter MCP + ExpeL extractor + ACI MCP
# Phase 2 (build-next): CodeAct skill + Voyager skill library + tree-search
# All gates default to safe minima. See PRD-008 §6 for phasing semantics.

[skills.code_interpreter]
# Persistent Python kernel as an MCP. Six tools: kernel.exec, list_vars,
# inspect, reset, interrupt, install_pkg. One kernel per Claude session,
# lazy spawn, idle watchdog. Wheelhouse-only package install (no PyPI).
enabled = true
idle_timeout_s = 1800          # 30 min; W044 warns if <300
max_memory_mb = 512            # RLIMIT_AS in MB
allow_pip_install = false      # if true, kernel.install_pkg works against pip_allowlist
# Wheels MUST be present in /var/lib/agentbox/code-interpreter-wheelhouse/.
# The Nix derivation bakes this list into the wheelhouse at image build.
pip_allowlist = [
  "numpy", "pandas", "scipy", "sympy", "matplotlib",
  "scikit-learn", "requests", "beautifulsoup4", "lxml",
  "networkx", "pydantic"
]

[skills.codeact]
# CodeAct skill — orchestrates the code-interpreter MCP for plan-execute-
# reflect loops. Depends on skills.code_interpreter.
enabled = true

[features.expel_lesson_extraction]
# Post-task experiential learning. Distils 0-N rules per completed
# trajectory into RuVector namespace code-harness-lessons as
# ex:DistilledLesson (memory_type=semantic, durable).
# See skills/expel-lesson-extractor/SKILL.md + ADR-019 §Mechanism 1.
enabled = true
max_lessons_per_task = 5       # cap on lessons extracted per trajectory; prevents noise flood
min_confidence = 0.6           # minimum confidence to store a lesson
confidence_floor = 0.3         # below this, lesson is auto-archived (ADR-019 §Garbage collection)
archive_after_days = 30        # lessons below floor demoted to *-archive after this many days
contradiction_sample_rate = 0.1  # 1/10 retrievals sampled for LLM-judge contradiction check

[skills.voyager_skill_library]
# Verified executable skill library. ex:VerifiedSkill records in
# code-harness-skills (memory_type=procedural). Three-gate VerificationGate.
# Phase 2 — depends on skills.code_interpreter + features.expel_lesson_extraction.
# See skills/voyager-skill-library/SKILL.md + ADR-019 §Mechanism 2.
# Validator: E044 (requires skills.code_interpreter.enabled = true).
enabled = false
max_skill_body_lines = 80      # reject candidates exceeding this line count
max_evidence_age_s = 3600      # verified_by trace URN must be younger than this
archive_after_days = 30        # non-max-version skills demoted to *-archive after N days

[skills.aci_shell]
# SWE-agent-style Agent-Computer Interface MCP. 5 tools (view/edit/
# search/test/submit). Phase 2 — off by default; opt-in only.
enabled = false
max_view_lines = 150           # hard cap per aci.view_file call
max_edit_context = 10          # max diff context lines in aci.edit_file response
test_command_allowlist = ["pytest", "cargo test", "npm test", "go test"]

[skills.tree_search_coder]
# Execution-gated tree-search. Generates N candidates, executes each
# in fresh kernel, scores by assertion pass. Slow path — explicitly
# invoked, never auto-routed. Phase 2 — off by default.
enabled = false
max_candidates = 5
per_branch_timeout_s = 60
spend_cap_usd = 0.50

[skills.ontology]
enabled = true
visionclaw_api_url = "http://visionclaw-server:4000"
# PRD-014 Seam D / D2: personal-KG concepts reach the shared ontology only
# through VisionClaw's GOVERNED path (ontology_propose → Whelk consistency →
# human approval → PR). The legacy ungoverned ontology_axiom_add backdoor
# (`POST /api/ontology/load`) is disabled by default; set true only for
# admin/bootstrap. Default off = ontology_axiom_add refuses + redirects.
direct_axiom_load = false

[skills.email_search]
# Private Email Search MCP gateway (DreamLab-AI/email-mcp-gateway). Runs on a
# separate LAN host that holds the mail archive + index; all reading/reasoning is
# local and every response is privacy-sanitised before it reaches an agent.
# When enabled + reachable, the entrypoint patches .mcp.json with a streamable-HTTP
# server carrying the bearer token from AGENTBOX_EMAIL_GATEWAY_TOKEN (never committed).
enabled = true
gateway_url = "http://192.168.2.48:8765"

