[core]
orchestration = "ruflo-v3"
vector_db = "ruvector-embedded"

[federation]
mode = "standalone"

[adapters]
beads        = "local-sqlite"
pods         = "off"
memory       = "off"
events       = "off"
orchestrator = "off"

[gpu]
backend = "none"

[desktop]
enabled    = false
stack      = "hyprland-wayland"
resolution = "1920x1080"

[sovereign_mesh]
enabled              = true
solid_pod            = true
nostr_bridge         = true
https_bridge         = false
publish_agent_events = false
telegram_mirror      = false
jss_rust_backend     = false

[observability]
metrics_port  = 9091
log_level     = "error"

[consultants]
enabled              = false
intelligence_signal  = false
log_dir              = "/var/lib/agentbox/consultations"

[consultants.codex]
enabled = false
model      = "gpt-5.4"
home       = "/home/openai-user/.codex"
timeout_ms = 180000

[consultants.gemini]
enabled = false
model      = "gemini-2.5-pro"
home       = "/home/gemini-user"
timeout_ms = 180000

[consultants.zai]
enabled = false
model      = "glm-5"
home       = "/home/zai-user"
timeout_ms = 180000

[consultants.perplexity]
enabled = false
model      = "sonar-pro"
timeout_ms = 60000

[consultants.deepseek]
enabled = false
model      = "deepseek-reasoner"
timeout_ms = 120000

[privacy_filter]
enabled = false
mode    = "off"
port    = 9092
dtype   = "bf16"
model   = "openai/privacy-filter"

[privacy_filter.policy]
pods         = "strict"
memory       = "strict"
events       = "soft"
beads        = "soft"
orchestrator = "off"
inbound      = "soft"
outbound     = "soft"

[privacy_filter.entities]
enabled = []

[providers.anthropic]
enabled  = true
env_var  = "ANTHROPIC_API_KEY"
optional_env_vars = []
auth_mode = "oauth"

[providers.openai]
enabled  = false
env_var  = "OPENAI_API_KEY"
optional_env_vars = ["OPENAI_BASE_URL"]
auth_mode = "api_key"

[providers.gemini]
enabled  = false
env_var  = "GOOGLE_GEMINI_API_KEY"
optional_env_vars = []
auth_mode = "api_key"

[providers.deepseek]
enabled  = false
env_var  = "DEEPSEEK_API_KEY"
optional_env_vars = ["DEEPSEEK_BASE_URL"]
auth_mode = "api_key"

[providers.perplexity]
enabled  = false
env_var  = "PERPLEXITY_API_KEY"
optional_env_vars = []
auth_mode = "api_key"

[providers.openrouter]
enabled  = false
env_var  = "OPENROUTER_API_KEY"
optional_env_vars = []
auth_mode = "api_key"

[providers.context7]
enabled  = false
env_var  = "CONTEXT7_API_KEY"
optional_env_vars = []
auth_mode = "api_key"

[providers.brave]
enabled  = false
env_var  = "BRAVE_API_KEY"
optional_env_vars = []
auth_mode = "api_key"

[providers.github]
enabled  = false
env_var  = "GITHUB_TOKEN"
optional_env_vars = []
auth_mode = "api_key"

[providers.zai]
enabled  = false
env_var  = "ZAI_API_KEY"
optional_env_vars = ["ZAI_ANTHROPIC_API_KEY", "ZAI_URL"]
auth_mode = "api_key"

[toolchains]
claude          = true
claude_code     = false
ruflo           = false
claude_flow     = false
agentic_qe      = false
nagual_qe       = false
gemini_cli      = false
codex           = false
code_server     = false
codebase_memory = false
rust            = false
cuda            = false

[skills.browser]
agent_browser = false
playwright    = false
qe_browser    = false

[skills.media]
ffmpeg           = false
imagemagick      = false
comfyui_builtin  = false

[skills.spatial_and_3d]
blender            = false
qgis               = false
gaussian_splatting = false

[skills.data_science]
pytorch = false
jupyter = false

[skills.docs]
latex          = false
mermaid        = false
report_builder = false

[skills.ontology]
enabled = false

[sovereign_mesh.relay]
enabled          = true
implementation   = "nostr-rs-relay"
port             = 7777
bind             = "127.0.0.1"
expose           = false
data_dir         = "/var/lib/nostr-relay"
ingress_policy   = "open"
allowed_pubkeys  = []
allowed_kinds    = [1, 1059, 30078, 27235, 38000, 38100]
pod_bridge       = true
external_fanout  = "off"
max_event_bytes  = 131072
messages_per_sec = 5
retention_days   = 30
allow_nip04      = false
info_description = "Agentbox sovereign relay"
info_contact     = ""

[integrations.comfyui_external]
enabled = false
url    = "http://comfyui:8188"
ws_url = "ws://comfyui:8188/ws"

[integrations.solid_pod_rs]
port                  = 8484
bind                  = "127.0.0.1"
storage               = "fs"
storage_root          = "/var/lib/solid"
base_url              = "http://127.0.0.1:8484"
enable_oidc           = false
enable_schnorr_verify = true
enable_dpop_cache     = false
notifications          = "websocket"
log_level              = "info"
enable_did_nostr       = true
enable_webhook_signing = true
enable_rate_limit      = true
enable_quota           = true
jss_v04_compat         = true
rate_limit_per_sec     = 20
quota_default_bytes    = 10737418240

[security.exceptions.nostr-relay]
writable_volumes = ["nostr-relay-data:/var/lib/nostr-relay"]
reason = "nostr-rs-relay SQLite journal and WAL require a writable durable path"

