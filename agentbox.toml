[core]
orchestration = "ruflo-v3"
vector_db = "ruvector-embedded"

# ── Five-slot adapter architecture (ADR-005) ───────────────────────────────────
# local-solid-rs is the first-class pod implementation (ADR-010); the legacy
# local-jss Python stub was retired 2026-04-25 and is no longer accepted by
# the schema. Each adapter slot resolves to one of three implementation
# classes — `local-*`, `external`, or `off` — see docs/user/configuration.md
# for the full matrix and trade-offs.
[adapters]
beads        = "off"
pods         = "local-solid-rs"
memory       = "external-pg"
events       = "local-jsonl"
orchestrator = "local-process-manager"

[sovereign_mesh]
enabled = true
solid_pod = true
nostr_bridge = true
https_bridge = true
publish_agent_events = true
telegram_mirror = true

# ── Operator identity (optional) ────────────────────────────────────────────────
# The human operator's Nostr identity. When set, this pubkey is:
#   - Added to the relay allowlist (can publish events to the embedded relay)
#   - Granted operator-level access to management API via NIP-98
#   - Tagged as the delegator on NIP-26 agent delegations
#   - Used as the WebID owner in Solid pod ACLs
# If omitted, the agentbox runs in autonomous mode (self-signed identity only).
# The private key is NEVER stored in agentbox.toml — pass it via env var
# OPERATOR_NOSTR_PRIVKEY or use NIP-07/NIP-46 remote signing.
[sovereign_mesh.operator]
pubkey_hex = ""                        # 64-char hex secp256k1 pubkey
npub       = ""                        # bech32 npub (alternative to hex; one is sufficient)
display_name = ""                      # human-readable name for event tags
relay_urls = []                        # operator's preferred relays for fan-out

# ── Embedded Nostr relay (PRD-004 / ADR-009 / DDD-003) ──────────────────────────
# Gives external agents and humans a durable path to talk to internal agents.
# Every signature-verified event targeting a local npub is persisted to the
# pod mailbox at pods/<npub>/events/inbox/<id>.json. Outbound messages written
# to events/outbox/ are signed by the sovereign identity and published to
# the embedded relay plus (optionally) the NOSTR_RELAYS fan-out list.
#
# Default shape: nostr-rs-relay on loopback :7777, allowlist ingress, pod-bridge
# on, no external fan-out (matches [federation].mode = "standalone").
[sovereign_mesh.relay]
enabled          = true
implementation   = "nostr-rs-relay"   # nostr-rs-relay | rnostr | external | off
port             = 7777
bind             = "127.0.0.1"
expose           = false
data_dir         = "/var/lib/nostr-relay"
ingress_policy   = "allowlist"        # allowlist | signed-only | open
allowed_pubkeys  = []                  # empty = self only (own npub); operator pubkey auto-added at boot
allowed_kinds    = [1, 1059, 30078, 27235, 38000, 38100]
pod_bridge       = true
external_fanout  = "off"               # bidirectional | publish-only | subscribe-only | off
max_event_bytes  = 131072
messages_per_sec = 5
retention_days   = 30
allow_nip04      = false
info_description = "Agentbox sovereign relay"
info_contact     = ""

# ── Networking ─────────────────────────────────────────────────────────────────
# Tailscale provides direct encrypted access to the agentbox from any device
# on your tailnet — no port-forwarding, no SSH tunnels, no firewall rules.
# Uses userspace networking by default (no /dev/net/tun needed).
#
# SECURITY WARNING: Tailscale bypasses the did:nostr identity boundary.
# Traffic arriving over the tailnet is authenticated by Tailscale ACLs, not
# by Nostr keypair signatures. This is convenient for dev but weakens the
# sovereign-mesh trust model. For production deployments, prefer the
# did:nostr + NIP-98 auth path and leave tailscale = false.
#
# Auth: set TAILSCALE_AUTHKEY in .env (create at https://login.tailscale.com/admin/settings/keys)
# or omit to use interactive login via `docker exec agentbox tailscale up`.
[networking]
tailscale = true
hostname = "agentbox"

[desktop]
enabled = true
stack = "hyprland-wayland"
resolution = "1920x1080"

[skills.browser]
agent_browser = true
playwright = true
qe_browser = true

[skills.media]
ffmpeg = true
imagemagick = true
comfyui_builtin = false

# ── RuVector PostgreSQL (external memory backend) ──────────────────────────────
# Used when adapters.memory = "external-pg". Shared with the host container mesh
# via docker_ragflow network. The ruvector-postgres container runs pgvector.
[integrations.ruvector_external]
conninfo = "postgresql://ruvector:ruvector@ruvector-postgres:5432/ruvector"

[integrations.comfyui_external]
enabled = false
url = "http://comfyui:8188"
ws_url = "ws://comfyui:8188/ws"

# ── solid-pod-rs (first-class; ADR-010) ─────────────────────────────────────────
# First-party Rust Solid Protocol 0.11 server from github.com/DreamLab-AI.
# Used by the pods adapter when adapters.pods = "local-solid-rs" (the default).
# See docs/developer/licensing.md for the AGPL-3.0-only aggregation analysis.
[integrations.solid_pod_rs]
port                   = 8484
bind                   = "127.0.0.1"
storage                = "fs"                    # fs | memory | s3
storage_root           = "/var/lib/solid"
base_url               = "http://127.0.0.1:8484"
enable_oidc            = false
enable_schnorr_verify  = true
enable_dpop_cache      = false
notifications          = "websocket"             # websocket | webhook | off
log_level              = "info"

# Sprint 5-9 features absorbed from upstream main — all on by default because
# they either sharpen sovereign-stack invariants (did_nostr) or close P0
# hardening gaps (rate_limit, quota, webhook_signing).
enable_did_nostr       = true     # did:nostr:<pubkey> → Solid WebID resolver (ADR-013)
enable_webhook_signing = true     # RFC 9421 Ed25519 outbound notification signing
enable_rate_limit      = true     # sliding-window LRU per-connection guard
enable_quota           = true     # per-pod storage quota via .quota.json sidecar
jss_v04_compat         = true     # preserve JavaScriptSolidServer v0.4 semantics
rate_limit_per_sec     = 20       # per-connection ceiling when enable_rate_limit
quota_default_bytes    = 10737418240  # 10 GiB per pod when enable_quota

[skills.spatial_and_3d]
qgis = true
blender = true
gaussian_splatting = false

[skills.data_science]
pytorch = true
jupyter = true

[skills.docs]
