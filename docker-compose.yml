# Agentbox 2.0 compose stack

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "988"
    security_opt:
      - seccomp=unconfined
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_VULKAN=1
      - OLLAMA_FLASH_ATTENTION=true
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_CONTEXT_LENGTH=8192

  agentbox:
    image: agentbox:runtime-x86_64-linux
    container_name: agentbox
    hostname: agentbox
    restart: unless-stopped
    depends_on:
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
      - "9700:9700"
      - "8484:8484"
      - "8888:8888"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:32b-instruct}
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY:-}
      - MANAGEMENT_API_KEY=${MANAGEMENT_API_KEY:-change-this-secret-key}
      - MANAGEMENT_API_AUTH_MODE=${MANAGEMENT_API_AUTH_MODE:-hybrid}
      - NOSTR_RELAYS=${NOSTR_RELAYS:-wss://relay.damus.io,wss://relay.primal.net}
      - AGENTBOX_AGENT_ID=${AGENTBOX_AGENT_ID:-agentbox-core}
    volumes:
      - ./agentbox.toml:/etc/agentbox.toml:ro
      - ./workspace:/workspace
      - ./projects:/projects
      - ruvector-data:/var/lib/ruvector
      - solid-data:/var/lib/solid
      - sovereign-identities:/var/lib/agentbox/identities
    security_opt:
      - no-new-privileges:true

volumes:
  ollama:
    name: ollama
  ruvector-data:
    name: agentbox-ruvector-data
  solid-data:
    name: agentbox-solid-data
  sovereign-identities:
    name: agentbox-sovereign-identities
