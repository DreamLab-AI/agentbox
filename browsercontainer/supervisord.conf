[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid
user=root

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:xvfb]
command=Xvfb :2 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
user=devuser
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:x11vnc]
command=x11vnc -display :2 -forever -shared -nopw -rfbport 5903 -noxdamage
user=devuser
autostart=true
autorestart=true
priority=20
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:chromium]
command=/opt/browsercontainer/launch-chromium.sh
user=devuser
autostart=true
autorestart=true
priority=25
startsecs=5
environment=DISPLAY=":2",HOME="/home/devuser",XDG_RUNTIME_DIR="/tmp/xdg-runtime",XDG_CACHE_HOME="/tmp/.cache",TREAT_AS_SECURE="%(ENV_TREAT_AS_SECURE)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:cdp-proxy]
command=socat TCP-LISTEN:9223,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:9222
user=devuser
autostart=true
autorestart=true
priority=26
startsecs=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:mcp-server]
command=node /opt/browsercontainer/server.js
user=devuser
autostart=true
autorestart=true
priority=30
startsecs=5
directory=/opt/browsercontainer
environment=DISPLAY=":2",SIDECAR_TRANSPORT="sse",SIDECAR_PORT="8931",HOME="/home/devuser",XDG_CACHE_HOME="/tmp/.cache",XDG_RUNTIME_DIR="/tmp/xdg-runtime",CDP_PORT="9222"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
