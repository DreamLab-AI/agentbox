# docker-compose.override.yml — side-by-side with MAD (agentic-workstation)
# Remaps ports to avoid collisions:
#   MAD:      9090, 8080, 5901, 2222
#   Agentbox: 9190, 8180, 5902, 2223
#
# Once MAD is deprecated, revert ports to standard values.

services:
  agentbox:
    # /usr/bin/env fix is now baked into the image entrypoint (flake.nix)

    # Use env file for API keys
    env_file:
      - .env

    # Ports come from the base compose (standard 9090/9700/9091/8484/8888/5901/8080).
    # MAD has been deprecated; no remap needed. Direct host SSH is not exposed —
    # use Tailscale SSH (config/tailscale auth) or `docker exec agentbox`.

    # Additional environment
    environment:
      # RuVector external PG
      - RUVECTOR_PG_CONNINFO=${RUVECTOR_PG_CONNINFO:-host=ruvector-postgres port=5432 dbname=ruvector user=ruvector password=${RUVECTOR_PG_PASSWORD:-ruvector}}
      - RUVECTOR_USE_EXTERNAL=true
      # Single source of truth for the postgres password (Q6). The
      # entrypoint substitutes this into the claude-flow config template
      # at /opt/agentbox/config/claude-flow-config.template.json so the
      # in-container plugin config and the DB connection use the same value.
      - RUVECTOR_PG_PASSWORD=${RUVECTOR_PG_PASSWORD:-ruvector}
      # GPU
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - CUDA_VISIBLE_DEVICES=0,1
      # ComfyUI external
      - COMFYUI_API_ENDPOINT=${COMFYUI_API_ENDPOINT:-http://192.168.2.48:3001}
      # Hardened rootfs (read_only:true) means /home/devuser/* is not writable
      # without an explicit volume. Route comfyui outputs to the uid-1000 /run
      # tmpfs so the adapter's `mkdir -p` succeeds at boot. Outputs are
      # ephemeral; mount a named volume here if persistence is needed.
      - COMFYUI_OUTPUTS=${COMFYUI_OUTPUTS:-/run/comfyui/output}
      - COMFYUI_LOCAL_ENDPOINT=${COMFYUI_LOCAL_ENDPOINT:-http://172.18.0.10:8188}
      # Local LLM
      - LOCAL_LLM_HOST=${LOCAL_LLM_HOST:-192.168.2.48}
      - LOCAL_LLM_PORT=${LOCAL_LLM_PORT:-8080}
      # Display for desktop/browser
      - DISPLAY=:1
      # Wayland compositor backend for Hyprland (stack = "hyprland-wayland").
      # "headless" (default): pure software compositor — safe for all containers,
      #   and Chrome still uses the NVIDIA GPU for WebGPU via ANGLE-Vulkan.
      # "drm": GPU-backed compositor (composited Wayland rendering on NVIDIA).
      #   Requires nvidia-drm with modeset=1 on the host and /dev/dri/card0 mapped.
      - WLR_BACKENDS=${WLR_BACKENDS:-headless}
      # Tailscale — set authkey for headless join, or omit for interactive login
      - TAILSCALE_AUTHKEY=${TAILSCALE_AUTHKEY:-}
      # Agent signing identity — set one of these in .env to use a stable
      # Nostr keypair instead of auto-generating on first boot.
      # AGENTBOX_NSEC accepts bech32 nsec1… (preferred — copy from any Nostr client).
      # AGENTBOX_PRIVKEY_HEX accepts the raw 64-char hex private key.
      # Both are untracked (.env is gitignored). Leave blank to auto-generate.
      - AGENTBOX_NSEC=${AGENTBOX_NSEC:-}
      - AGENTBOX_PRIVKEY_HEX=${AGENTBOX_PRIVKEY_HEX:-}

    # Additional volumes (Q16 — override surface).
    # Base owns: agentbox.toml ro, baseline named volumes (ruvector-data,
    # solid-data, sovereign-identities, agentbox-secrets), feature-exception
    # writable volumes (codeserver-config, ctm-config, nostr-relay-data,
    # tailscale-state, ./projects, /home/devuser/workspace bind).
    # Override owns: host bind mounts (project tree, .claude, .config/claude),
    # the MAD workspace external alias (until migrated, Q43), and any
    # operator-specific paths.
    volumes:
      - /home/john/githubs/visionflow-hp:/home/devuser/workspace/project:rw
      # gaussian project — host bind so it can be worked on from inside agentbox
      # (appears at /home/devuser/workspace/gaussian; writable).
      - /home/john/githubs/gaussian:/home/devuser/workspace/gaussian:rw
      # Q20 (escalation accepted-with-mitigation): the writable bind to the
      # host's .claude is required for plugin install state, OAuth token
      # refresh, and settings updates. The risk that a compromised in-container
      # tool can modify the host's .claude is documented in
      # docs/user/configuration.md §Security trade-offs. Operators who run
      # untrusted code in agentbox should mount :ro and accept that plugin
      # updates won't persist.
      - ${HOME}/.claude:/home/devuser/.claude:rw
      - ${HOME}/.config/claude:/home/devuser/.config/claude:rw
      # Second mount surfaces the host's .claude at the host-side path so
      # Claude Code's plugin registry (installed_plugins.json,
      # known_marketplaces.json), which persists absolute host paths,
      # resolves inside the container. Set HOST_CLAUDE_PATH=$HOME/.claude
      # on the host shell before `docker compose up`. Default routes to a
      # throwaway path so the line is harmless when HOST_CLAUDE_PATH is unset.
      - ${HOME}/.claude:${HOST_CLAUDE_PATH:-/home/devuser/.claude-host-link-noop}:rw
      # Q21: Docker socket mount (accepted security trade-off — local dev host).
      # Allows agentbox to orchestrate sibling containers on visionclaw_network.
      # See ADR (Q21) for the documented escalation: host-escape risk in
      # combination with SYS_ADMIN. On multi-tenant or hardened deployments,
      # replace with a tecnativa/docker-socket-proxy sidecar restricted to
      # specific GET endpoints.
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # X11 socket is provided by the desktop security exception's tmpfs
      # in the base compose (in-container VNC at :5902). Host X11
      # forwarding would mount /tmp/.X11-unix as a bind here, but that's
      # mutually exclusive with the tmpfs.
      #
      # (this machine) legacy MAD workspace volume removed — not present here.
      # The base compose's `./workspace:/home/devuser/workspace` bind is used.

    # Resource provisioning — this host: 251G RAM, 48 cores, 2x RTX 6000 Ada (96G VRAM)
    # Highly provisioned for agentic browser workloads with WebGPU inference.
    # cpuset pins to cores 0-29 (leaves 2 cores for host OS overhead).
    # Performance governor should be set on host: cpupower frequency-set -g performance
    deploy:
      resources:
        limits:
          cpus: '30'
          memory: 220G
        reservations:
          cpus: '16'
          memory: 64G
          devices:
            - driver: nvidia
              count: all
              # "graphics" enables Vulkan ICD mount — required for WebGPU via ANGLE-Vulkan.
              capabilities: [gpu, compute, utility, graphics]

    # Join visionclaw_network for service discovery
    networks:
      - default
      - visionclaw

    # security_opt (no-new-privileges:false + seccomp) is set in the base
    # docker-compose.yml. cap_add is also defined in the base; we extend it
    # implicitly here only via shm_size sizing for agent workloads.
    shm_size: '32gb'

    # Docker socket access: host docker group is gid 965. Without this,
    # devuser (uid 1000) can't talk to /var/run/docker.sock and every
    # docker/compose command requires sudo (blocked by no-new-privileges).
    group_add:
      - "965"

networks:
  visionclaw:
    external: true
    name: visionclaw_network

# volumes: (this machine) the legacy MAD external volume `mad-workspace` was
# removed — agentbox uses the base compose's `./workspace` bind instead.
# Base declares all named volumes (ruvector-data, solid-data, etc.).
