# Weekly `nix flake update` — bumps all Nix inputs (nixpkgs, flake-utils,
# nix2container, rust-overlay, skills). Opens a PR if flake.lock changed.
#
# Complements renovate.json, which handles npm / GitHub Actions / custom regex
# pins. This workflow is specifically for the Nix input graph.

name: nix-flake-update

on:
  schedule:
    # Mondays at 06:00 UTC — same rhythm as Renovate's default.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nix-flake-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Run flake update
        id: update
        run: |
          set -euo pipefail
          before=$(sha256sum flake.lock | cut -d' ' -f1)
          nix flake update --commit-lock-file=false
          after=$(sha256sum flake.lock | cut -d' ' -f1)
          if [ "$before" = "$after" ]; then
            echo "no-changes=true" >> "$GITHUB_OUTPUT"
            echo "flake.lock unchanged; nothing to PR"
          else
            echo "no-changes=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock updated"
            git diff flake.lock | head -80 || true
          fi

      - name: Run flake check on updated inputs
        if: steps.update.outputs.no-changes == 'false'
        run: nix flake check --no-build --print-build-logs

      - name: Create pull request
        if: steps.update.outputs.no-changes == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: deps/nix-flake-update
          delete-branch: true
          commit-message: |
            deps(nix): weekly flake input update

            Auto-generated by .github/workflows/nix-flake-update.yml.
            Review the diff of flake.lock and run `nix flake check` locally
            before merging; CI's flake-check already passed on this PR.
          title: "deps(nix): weekly flake input update"
          body: |
            Weekly `nix flake update` run.

            ### What changed

            See the diff on `flake.lock` for per-input commit bumps.

            ### Pre-merge checklist

            - [ ] `nix build .#runtime` succeeds on x86_64-linux
            - [ ] `nix build .#runtime` succeeds on aarch64-linux
            - [ ] Contract-test harness green
            - [ ] No unexpected image-size jump (`docker images` diff)

            Closes the `deps/nix-flake-update` tracking branch.
          labels: |
            deps
            nix
