# build-multi-arch.yml
#
# Triggers: push to main, release tags (v*), workflow_dispatch.
# Produces: ghcr.io/dreamlab-ai/agentbox:<sha>-amd64 and :<sha>-arm64 per-arch
#           images, then assembles them into a multi-arch manifest at
#           ghcr.io/dreamlab-ai/agentbox:<sha>. On main-branch pushes the
#           :latest tag is also updated.
#
# Strategy: each arch builds on a native GitHub-hosted runner (no QEMU), using
# Nix to produce a content-addressed OCI tarball via nix2container.

name: Build and publish multi-arch image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-multi-arch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            nix_system: x86_64-linux
          - arch: arm64
            runner: ubuntu-24.04-arm
            nix_system: aarch64-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Optional: restore Nix store from Cachix to speed up builds.
      # Requires CACHIX_AUTH_TOKEN secret to be set in repository settings.
      # TODO: set CACHIX_AUTH_TOKEN secret and replace the placeholder below.
      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: agentbox          # TODO: replace with your Cachix cache name
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        continue-on-error: true   # allow builds to proceed even if Cachix is unconfigured

      - name: Build runtime image with Nix
        run: nix build .#runtime --print-build-logs

      - name: Load image into Docker
        run: docker load < result

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push arch-suffixed image
        run: |
          ARCH_TAG="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-${{ matrix.arch }}"
          # nix2container tags the image as agentbox:runtime-<nix_system>
          docker tag "agentbox:runtime-${{ matrix.nix_system }}" "${ARCH_TAG}"
          docker push "${ARCH_TAG}"

  manifest:
    name: Assemble and push multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      contents: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push SHA manifest
        run: |
          AMD64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-amd64"
          ARM64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-arm64"
          SHA_TAG="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}"

          docker manifest create "${SHA_TAG}" \
            --amend "${AMD64}" \
            --amend "${ARM64}"
          docker manifest push "${SHA_TAG}"

      - name: Create and push :latest manifest (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          AMD64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-amd64"
          ARM64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-arm64"
          LATEST="ghcr.io/dreamlab-ai/agentbox:latest"

          docker manifest create "${LATEST}" \
            --amend "${AMD64}" \
            --amend "${ARM64}"
          docker manifest push "${LATEST}"

      - name: Create and push release tag manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          AMD64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-amd64"
          ARM64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-arm64"
          RELEASE_TAG="ghcr.io/dreamlab-ai/agentbox:${{ github.ref_name }}"

          docker manifest create "${RELEASE_TAG}" \
            --amend "${AMD64}" \
            --amend "${ARM64}"
          docker manifest push "${RELEASE_TAG}"
