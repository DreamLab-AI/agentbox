# build-multi-arch.yml
#
# Triggers: push to main, release tags (v*), workflow_dispatch.
# Produces: ghcr.io/dreamlab-ai/agentbox:<sha>-amd64 and :<sha>-arm64 per-arch
#           images, then assembles them into a multi-arch manifest at
#           ghcr.io/dreamlab-ai/agentbox:<sha>. On main-branch pushes the
#           :latest tag is also updated.
#
# Strategy: each arch builds on a native GitHub-hosted runner (no QEMU), using
# Nix to produce a content-addressed OCI tarball via nix2container.

name: Build and publish multi-arch image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-multi-arch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            nix_system: x86_64-linux
          - arch: arm64
            runner: ubuntu-24.04-arm
            nix_system: aarch64-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Restore Nix store from Cachix when the secret is configured, otherwise
      # skip silently. Configure via repo variable CACHIX_CACHE_NAME; default
      # is 'dreamlab-ai'. The secret CACHIX_AUTH_TOKEN must be set for pushes
      # to work; missing secret is tolerated (read-only cache still works).
      - name: Set up Cachix (pull + push)
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'dreamlab-ai' }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build runtime image with Nix
        run: nix build .#runtime --print-build-logs

      - name: Record closure size
        id: closure
        run: |
          set -euo pipefail
          path=$(readlink -f result)
          size_bytes=$(du -sb "$path" | cut -f1)
          size_mb=$(( size_bytes / 1024 / 1024 ))
          echo "size_bytes=$size_bytes" >> "$GITHUB_OUTPUT"
          echo "size_mb=$size_mb"       >> "$GITHUB_OUTPUT"
          echo "Nix closure: ${size_mb} MB (${size_bytes} bytes)"

      - name: Load image into Docker
        run: docker load < result

      - name: Record compressed image size
        id: compressed
        run: |
          set -euo pipefail
          size=$(docker image inspect "agentbox:runtime-${{ matrix.nix_system }}" --format '{{.Size}}')
          size_mb=$(( size / 1024 / 1024 ))
          echo "size_bytes=$size"    >> "$GITHUB_OUTPUT"
          echo "size_mb=$size_mb"    >> "$GITHUB_OUTPUT"
          echo "Compressed image: ${size_mb} MB"
          {
            echo "### Image size (${{ matrix.arch }})"
            echo "- Nix closure: ${{ steps.closure.outputs.size_mb }} MB"
            echo "- Compressed:  ${size_mb} MB"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Guard against runaway image growth
        run: |
          set -euo pipefail
          # PRD-001 §8 commits to base runtime under 4 GB compressed; fail
          # if a build drifts past 5 GB to catch regressions early. The
          # `full` / `cuda-runtime` / `gaussian-splatting` variants have
          # their own ceilings (up to 25 GB per the CUDA image target)
          # and are built by separate workflow runs.
          max_mb=5120
          actual="${{ steps.compressed.outputs.size_mb }}"
          if [ "$actual" -gt "$max_mb" ]; then
            echo "::error::compressed image is ${actual} MB > ceiling ${max_mb} MB (PRD-001 §8)"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push arch-suffixed image
        run: |
          ARCH_TAG="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-${{ matrix.arch }}"
          # nix2container tags the image as agentbox:runtime-<nix_system>
          docker tag "agentbox:runtime-${{ matrix.nix_system }}" "${ARCH_TAG}"
          docker push "${ARCH_TAG}"

  manifest:
    name: Assemble and push multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      contents: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push SHA manifest
        run: |
          AMD64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-amd64"
          ARM64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-arm64"
          SHA_TAG="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}"

          docker manifest create "${SHA_TAG}" \
            --amend "${AMD64}" \
            --amend "${ARM64}"
          docker manifest push "${SHA_TAG}"

      - name: Create and push :latest manifest (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          AMD64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-amd64"
          ARM64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-arm64"
          LATEST="ghcr.io/dreamlab-ai/agentbox:latest"

          docker manifest create "${LATEST}" \
            --amend "${AMD64}" \
            --amend "${ARM64}"
          docker manifest push "${LATEST}"

      - name: Create and push release tag manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          AMD64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-amd64"
          ARM64="ghcr.io/dreamlab-ai/agentbox:${{ github.sha }}-arm64"
          RELEASE_TAG="ghcr.io/dreamlab-ai/agentbox:${{ github.ref_name }}"

          docker manifest create "${RELEASE_TAG}" \
            --amend "${AMD64}" \
            --amend "${ARM64}"
          docker manifest push "${RELEASE_TAG}"
