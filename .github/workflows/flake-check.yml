# flake-check.yml
#
# Triggers: all pull_requests.
# Produces: `nix flake check --no-build` on both x86_64-linux and aarch64-linux,
#           catching Nix evaluation regressions (attribute errors, type errors,
#           assertion failures) before they land on main.
#
# --no-build means only the Nix expression is evaluated; no derivations are
# realised. This keeps the job under 5 minutes p95.

name: Nix flake check

on:
  pull_request:

concurrency:
  group: flake-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flake-check:
    name: Check ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # TODO: set CACHIX_AUTH_TOKEN secret in repository settings to enable
      # Nix store caching and speed up subsequent eval runs.
      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: agentbox          # TODO: replace with your Cachix cache name
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        continue-on-error: true

      - name: Run nix flake check (eval only)
        run: nix flake check --no-build --print-build-logs
