# ci.yml
#
# Aggregate "CI passed" status check. Pared back to high-value gates only:
#   - shellcheck error        (bash lint, error severity)
#   - secret-scan             (gitleaks)
#   - manifest-validate       (agentbox config validate + TUI round-trip)
#
# Removed (low value-to-noise ratio):
#   - runtime-contract        (most tests skip without Docker anyway)
#   - docs-ci                 (spelling/mermaid/ascii noise)
#   - shellcheck warning      (advisory, not blocking)

name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: read

jobs:
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    # Only meaningful on PRs (branch protection gate) and main-branch pushes.
    # Skip on other pushes — those don't have a PR check suite to wait for.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Wait for required workflows
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success,skipped
          # Job names must match the `name:` field in each workflow exactly.
          # E021 rename (2026-04-25): flake-check job names are "Check x86_64-linux"
          # and "Check aarch64-linux"; manifest-validate is
          # "agentbox config validate + TUI round-trip".
          check-regexp: '^(ShellCheck error|gitleaks|agentbox config validate \+ TUI round-trip)$'
          verbose: true

      - name: CI summary
        run: |
          echo "All required PR-gate workflows reported success."
          echo "Branch protection may require the 'CI passed' status."
