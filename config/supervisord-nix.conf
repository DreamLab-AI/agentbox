; Minimal supervisord config for Nix-built agentbox container
; Keeps the container alive and provides a shell environment

[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0766

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; Keep-alive process so the container stays running
[program:keepalive]
command=%(ENV_SLEEP_CMD)s infinity
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Bootstrap seal — writes /run/agentbox/bootstrap.done once all required
; programs are RUNNING, signalling BootstrapCompleted (DDD-001, PRD-002 §9).
; priority=99 ensures this runs last in the startup sequence.
; autorestart=false — one-shot; if it fails, the sentinel is never written.
[program:bootstrap-seal]
command=/opt/agentbox/config/seal-bootstrap.sh
autostart=true
autorestart=false
startsecs=0
priority=99
environment=SUPERVISORD_CONF="/etc/supervisord.conf",BOOTSTRAP_SEAL_TIMEOUT="120"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
