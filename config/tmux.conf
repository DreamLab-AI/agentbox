# Agentbox tmux configuration — fish shell + Tokyo Night theme
# Replaces Zellij (ADR-058 migration track)

# Fish as default shell
set -g default-command "fish"

# Mouse support
set -g mouse on

# 256 color + true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Large scrollback
set -g history-limit 50000

# ── Status bar — Tokyo Night dark ────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-interval 15

# Left: session badge
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  agentbox #[fg=#7aa2f7,bg=#24283b,nobold] #[fg=#565f89,bg=#24283b] #S #[fg=#24283b,bg=#1a1b26] "
set -g status-left-length 30

# Right: services + git branch + time
set -g status-right-length 80
set -g status-right "#[fg=#24283b,bg=#1a1b26]#[fg=#565f89,bg=#24283b] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo '-') #[fg=#3b4261,bg=#24283b]│#[fg=#565f89] %H:%M #[fg=#7aa2f7,bg=#24283b]#[fg=#1a1b26,bg=#7aa2f7,bold] #{host_short} "

# Window tabs
set -g window-status-format "#[fg=#3b4261] #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#3b4261]#[fg=#7aa2f7,bg=#3b4261,bold] #I:#W #[fg=#3b4261,bg=#1a1b26]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines heavy

# Message and command mode
set -g message-style "bg=#7aa2f7,fg=#1a1b26"
set -g message-command-style "bg=#e0af68,fg=#1a1b26"

# Copy mode highlight
setw -g mode-style "bg=#3b4261,fg=#7aa2f7"

# Start windows at 0 (matches MAD layout)
set -g base-index 0

# Vi mode for copy
setw -g mode-keys vi

# Faster escape (for vi users)
set -sg escape-time 10

# Focus events for terminals that support them
set -g focus-events on

# Activity monitoring (subtle)
setw -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#e0af68"
