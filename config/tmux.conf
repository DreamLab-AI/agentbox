# Agentbox tmux configuration — fish shell + dark theme
# Replaces Zellij (ADR-058 migration track)

# Fish as default shell (resolved from PATH at runtime)
set -g default-shell /usr/bin/env
set -g default-command "fish"

# Mouse support
set -g mouse on

# 256 color + true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Large scrollback
set -g history-limit 50000

# Status bar — dark theme
set -g status-style "bg=#1a1a2e,fg=#e0e0e0"
set -g status-left "#[fg=#4c7899,bold] agentbox "
set -g status-left-length 20
set -g status-right "#[fg=#666666]%H:%M "
set -g status-right-length 20
set -g window-status-current-format "#[fg=#4c7899,bold] #I:#W "
set -g window-status-format " #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#4c7899"

# Start windows at 0 (matches MAD layout)
set -g base-index 0

# Vi mode for copy
setw -g mode-keys vi

# Faster escape (for vi users)
set -sg escape-time 10

# Focus events for terminals that support them
set -g focus-events on
