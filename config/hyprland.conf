# Agentbox Hyprland configuration — headless container compositor
#
# Designed for WLR_BACKENDS=headless (default) so no DRM/KMS device is
# required.  Set WLR_BACKENDS=drm at runtime to switch to GPU-backed mode
# when /dev/dri/card0 is mapped in via NVIDIA_DRIVER_CAPABILITIES=graphics.
#
# wayvnc captures HEADLESS-1 and serves VNC on :5901.
# XWayland runs on DISPLAY=:1 for X11 app compat (agent-browser, xdotool).

monitor = HEADLESS-1, 1920x1080@60, 0x0, 1

# No animations — agentic workflows don't need visual transitions
animations {
    enabled = false
}

# Minimal input — no physical input in container context
input {
    follow_mouse = 1
    sensitivity  = 0
}

general {
    border_size           = 0
    no_border_on_floating = true
    gaps_in               = 0
    gaps_out              = 0
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

# XWayland compatibility — force 1:1 scaling so pixel coords match DISPLAY=:1
xwayland {
    force_zero_scaling = true
}

# No gestures, no misc visual chrome
gestures {
    workspace_swipe = false
}

misc {
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    vfr                     = true
}
